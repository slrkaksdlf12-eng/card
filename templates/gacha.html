<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <title data-i18n="gacha_title">Gacha</title>

  <!-- 공용 카드 스타일 -->
  <link rel="stylesheet" href="/static/css/card.css">

  <!-- SSR 스타일 -->
  <link rel="stylesheet" href="/static/css/ssr.css">

  <!-- gacha 로직 -->
  <script src="/static/js/card.js" defer></script>
</head>

<body>

  <!-- 🔥 UI LAYER -->
  <div class="ui-layer">
    <button class="back-btn" onclick="location.href='/'" data-i18n="back">
      BACK
    </button>
  </div>

  <!-- 🔥 MAIN LAYER -->
  <div class="wrap">
    <div id="cardArea"></div>
  </div>

  <!-- =========================
       🔥 SSR OVERLAY (CINEMATIC CUTSCENE STRUCTURE)
  ========================= -->
  <div id="ssrOverlay">

    <!-- 🎬 CAMERA SYSTEM (핵심 추가) -->
    <div class="camera -x">

      <!-- 🌸 BACKGROUND / PARTICLE LAYER -->
      <div class="bg-layer"></div>

      <!-- 🃏 CARD / UI LAYER -->
      <div class="card-layer"></div>

    </div>

  </div>

  <!-- SSR 로직 -->
  <script src="/static/js/ssr.js" defer></script>

</body>
</html>
