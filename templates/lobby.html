<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>lobby</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: sans-serif;
}

/* 배경 */
#bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: url("/static/assets/images/1.png") no-repeat center center;
  background-size: cover;
}

canvas { pointer-events: none; }

/* UI */
.ui {
  position: absolute;
  inset: 0;
  z-index: 10;
}

/* 중앙 */
.center {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 버튼 */
.btn {
  width: 220px;
  height: 56px;
  margin: 10px 0;

  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);

  color: white;
  font-size: 15px;

  display: flex;
  align-items: center;
  justify-content: center;

  backdrop-filter: blur(10px);
  white-space: nowrap;
}

/* 패널 */
.panel {
  position: absolute;
  left: 50%;
  top: calc(50% + 190px);
  transform: translateX(-50%);

  width: 300px;
  padding: 14px;

  display: none;
  flex-direction: column;
  gap: 14px;

  background: rgba(15,15,25,0.92);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px;
}

.panel.open {
  display: flex;
}

/* row */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
  font-size: 13px;
}

/* SWITCH */
.switch {
  width: 120px;
  height: 38px;
  border-radius: 20px;
  position: relative;
  display: flex;
  overflow: hidden;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  cursor: pointer;
}

.switch .side {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  white-space: nowrap;
}

.switch .onActive,
.switch .offActive {
  color: white;
  font-weight: 600;
}

.knob {
  position: absolute;
  width: 50%;
  height: 100%;
  background: rgba(255,255,255,0.18);
  transition: 0.25s ease;
  left: 0;
}

.switch.on .knob {
  left: 50%;
}

/* LANG */
.lang {
  display: flex;
  width: 170px;
  height: 42px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.15);
}

.lang div {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  background: rgba(255,255,255,0.06);
  color: white;
  white-space: nowrap;
}

.lang .active {
  background: rgba(255,255,255,0.25);
}

/* logout */
.logout {
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  background: rgba(255,80,80,0.15);
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<div id="bg">
  <canvas id="canvas"></canvas>
</div>

<div class="ui">

  <div class="center">
    <div class="btn" id="btn_gacha" onclick="location.href='/gacha'"></div>
    <div class="btn" id="btn_collection" onclick="location.href='/collection'"></div>
    <div class="btn" id="btn_settings" onclick="togglePanel()"></div>
  </div>

  <!-- panel -->
  <div id="panel" class="panel">

    <!-- SOUND -->
    <div class="row">
      <div id="txt_sound"></div>

      <div class="switch" id="soundSwitch" onclick="toggleSound()">
        <div class="knob"></div>
        <div class="side on">ON</div>
        <div class="side off">OFF</div>
      </div>
    </div>

    <!-- LANG -->
    <div class="row">
      <div id="txt_lang"></div>

      <div class="lang">
        <div id="koBtn" onclick="setLang('ko')">한국어</div>
        <div id="jaBtn" onclick="setLang('ja')">日本語</div>
      </div>
    </div>

    <div class="logout" id="logout_btn" onclick="location.href='/logout'"></div>

  </div>
</div>

<script>

/* ================= LANG ================= */

const dicts = {
  ko: {
    btn_gacha: "카드 뽑기",
    btn_collection: "컬렉션",
    btn_settings: "설정",
    txt_sound: "소리",
    txt_lang: "언어",
    logout_btn: "로그아웃"
  },
  ja: {
    btn_gacha: "カードを引く",
    btn_collection: "コレクション",
    btn_settings: "設定",
    txt_sound: "音",
    txt_lang: "言語",
    logout_btn: "ログアウト"
  }
};

let lang = localStorage.getItem("lang") || "ko";

function applyLang() {
  const d = dicts[lang];

  document.getElementById("btn_gacha").innerText = d.btn_gacha;
  document.getElementById("btn_collection").innerText = d.btn_collection;
  document.getElementById("btn_settings").innerText = d.btn_settings;
  document.getElementById("txt_sound").innerText = d.txt_sound;
  document.getElementById("txt_lang").innerText = d.txt_lang;
  document.getElementById("logout_btn").innerText = d.logout_btn;

  document.getElementById("koBtn").classList.toggle("active", lang === "ko");
  document.getElementById("jaBtn").classList.toggle("active", lang === "ja");
}

function setLang(l) {
  lang = l;
  localStorage.setItem("lang", l);
  applyLang();
}

/* ================= SOUND ================= */

let sound = true;

function toggleSound() {
  sound = !sound;
  document.getElementById("soundSwitch").classList.toggle("on", sound);
}

/* ================= PANEL ================= */

function togglePanel() {
  document.getElementById("panel").classList.toggle("open");
}

/* ================= INIT ================= */

window.addEventListener("DOMContentLoaded", () => {
  applyLang();
  document.getElementById("soundSwitch").classList.toggle("on", sound);
});

/* ================= PARTICLES (원본 유지 + 마우스 연결 복구) ================= */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const dpr = window.devicePixelRatio || 1;
let w, h;
let particles = [];

let mouse = { x: null, y: null };

window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

function resize() {
  w = window.innerWidth;
  h = window.innerHeight;

  canvas.width = w * dpr;
  canvas.height = h * dpr;

  canvas.style.width = w + "px";
  canvas.style.height = h + "px";

  ctx.setTransform(dpr,0,0,dpr,0,0);
  init();
}

function init() {
  particles = [];
  const count = Math.min(120, Math.floor((w*h)/10000));

  for (let i=0;i<count;i++) {
    particles.push({
      x: Math.random()*w,
      y: Math.random()*h,
      vx:(Math.random()-0.5)*0.5,
      vy:(Math.random()-0.5)*0.5
    });
  }
}

window.addEventListener("resize", resize);
resize();

function draw(){
  ctx.clearRect(0,0,w,h);

  for (let p of particles) {

    p.x += p.vx;
    p.y += p.vy;

    if (p.x<0||p.x>w) p.vx*=-1;
    if (p.y<0||p.y>h) p.vy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.8)";
    ctx.fill();

    /* 🔥 마우스 연결 */
    if (mouse.x) {
      let dx = p.x - mouse.x;
      let dy = p.y - mouse.y;
      let d2 = dx*dx + dy*dy;

      if (d2 < 160*160) {
        ctx.beginPath();
        ctx.strokeStyle="rgba(255,255,255,0.25)";
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(mouse.x,mouse.y);
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
