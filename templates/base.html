<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{ title }}</title>

    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;

            overflow: auto; /* 🔥 핵심: hidden 금지 */
        }

        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
        }

        /* ================= TOP BAR ================= */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 48px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 0 12px;
            background: #0f0f0f;

            z-index: 1000;
        }

        .user {
            font-size: 12px;
            opacity: 0.7;
        }

        /* 🔥 settings 버튼 */
        .settings-btn {
            font-size: 22px;
            color: white;
            cursor: pointer;

            z-index: 999999;
            position: relative;
        }

        /* ================= CONTENT ================= */
        .app {
            flex: 1;
            padding-top: 60px;
            padding-bottom: 80px;

            width: 100%;
        }

        /* ================= BOTTOM NAV ================= */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;

            width: 100%;
            height: 60px;

            display: flex;
            background: #111;

            z-index: 1000;
        }

        .bottom-nav button {
            flex: 1;
            background: none;
            border: none;
            color: white;
        }

        /* ================= SETTINGS PANEL ================= */
        .settings-panel {
            position: fixed;
            top: 50px;
            right: 10px;

            width: 160px;

            background: #1a1a1a;
            color: white;

            border-radius: 10px;
            padding: 10px;

            display: none;

            z-index: 2147483647; /* 🔥 최상단 강제 */
        }

        .settings-panel.open {
            display: flex;
            flex-direction: column;
        }

        .settings-panel button {
            background: none;
            border: none;
            color: white;
            padding: 10px;
            text-align: left;
        }
    </style>
</head>

<body>

<!-- 🔥 TOP BAR -->
<div class="top-bar">
    <div class="user">{{ user }}</div>

    <div class="settings-btn" id="settingsBtn">⚙</div>
</div>

<!-- 🔥 CONTENT -->
<div class="app">
    {% block content %}{% endblock %}
</div>

<!-- 🔥 BOTTOM -->
<div class="bottom-nav">
    <button onclick="location.href='/lobby'">HOME</button>
    <button onclick="location.href='/gacha'">GACHA</button>
    <button>COLLECT</button>
</div>

<!-- 🔥 SETTINGS -->
<div id="settingsPanel" class="settings-panel">

    <button onclick="location.href='/logout'">LOGOUT</button>

    <button onclick="setLanguage('ko')">한국어</button>
    <button onclick="setLanguage('ja')">日本語</button>

</div>

<script src="/static/js/app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const btn = document.getElementById("settingsBtn");
    const panel = document.getElementById("settingsPanel");

    if (!btn || !panel) return;

    btn.addEventListener("click", () => {
        panel.classList.toggle("open");
    });
});
</script>

</body>
</html>
